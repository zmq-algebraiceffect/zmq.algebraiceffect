name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private submodules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          HEADER=$(echo -n "x-access-token:${GH_TOKEN}" | base64)
          git config --global "http.https://github.com.extraheader" "AUTHORIZATION: basic ${HEADER}"

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload externals
        uses: actions/upload-artifact@v4
        with:
          name: zmqae.algebraiceffect-macos
          path: externals/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private submodules
        shell: pwsh
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          $token = [Convert]::ToBase64String([System.Text.Encoding]::ASCII.GetBytes("x-access-token:${{env:GITHUB_TOKEN}}"))
          git config --global "http.https://github.com.extraheader" "AUTHORIZATION: basic $token"

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload externals
        uses: actions/upload-artifact@v4
        with:
          name: zmqae.algebraiceffect-windows
          path: externals/
